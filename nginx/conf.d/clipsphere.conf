# HTTP — health endpoint + redirect everything else to HTTPS.
server {
    listen 80 default_server;
    server_name clipsphere.local localhost;

    location = /health-nginx {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS gateway.
server {
    listen 443 ssl;
    http2 on;
    server_name clipsphere.local localhost;

    ssl_certificate     /etc/nginx/certs/clipsphere.local.crt;
    ssl_certificate_key /etc/nginx/certs/clipsphere.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Stripe webhook MUST receive the raw body byte-for-byte. Do not buffer
    # or gzip; Express has express.raw() mounted on this exact path.
    location = /api/v1/tips/webhook {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Socket.io — needs WebSocket Upgrade + Connection headers.
    location /socket.io/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Uploads can be slow; stream the request body through.
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Swagger UI
    location /api-docs {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /api-docs/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # MinIO storage proxy. Bucket paths are routed directly so the request
    # path matches what the AWS signer signed — any rewrite would invalidate
    # the SigV4 canonical-path hash. MINIO_PUBLIC_URL must therefore be the
    # bare host (https://clipsphere.local) with no prefix.
    location ~ ^/(clipsphere-videos|clipsphere-avatars)/ {
        proxy_pass http://minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        # Allow Range requests for video streaming.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Nginx-served static assets bundled into the image (logos, favicons, etc.).
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js build artifacts — cache aggressively in Nginx.
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_cache static_cache;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
