user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    # Allow video uploads up to ~100 MB (matches multer limit) plus headroom.
    client_max_body_size 150m;

    # Forwarded-for headers from any client (we are behind Docker, fine in dev).
    set_real_ip_from 0.0.0.0/0;
    real_ip_header   X-Forwarded-For;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Map for WebSocket upgrade (Socket.io). The 'Connection' header must be
    # "upgrade" only when 'Upgrade' header is set, else "close".
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Cache zone for proxied static assets.
    proxy_cache_path /var/cache/nginx/static
                     keys_zone=static_cache:10m
                     max_size=500m
                     inactive=60m
                     use_temp_path=off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml
        image/svg+xml;

    upstream backend_upstream {
        server backend:5000;
        keepalive 32;
    }
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }
    upstream minio_upstream {
        server minio:9000;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
